<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Running bear illustration</title>
  <desc id="desc">A dark navy bear silhouette running across a black background with a soft glow.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="48%" r="44%">
      <stop offset="0%" stop-color="#7f8ea9" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#51607a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#05070b" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <filter id="edgeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <path id="bear-shape" d="M639 216c70 0 129 21 178 64 36 31 44 59 62 82 21 28 73 39 73 78 0 80-57 122-155 122-31 0-57 10-77 31-24 24-29 53-44 93-14 37-48 84-86 119 35 8 70 26 105 56 45 40 62 72 62 97 0 18-10 30-34 47-40 28-100-2-165-70-57-59-95-86-161-96-121-19-166-85-178-160-24 12-49 17-78 17-56 0-83-34-67-75 18-49 59-103 112-146 21-17 30-36 31-63 2-61 43-143 115-215 64-65 109-96 177-104 86-10 169 2 221 11 19 3 34-4 49-17l111-88c-7-14-10-30-10-47 0-38 28-66 63-66 36 0 63 28 63 66l-1 10c63 5 109 27 139 61 30 33 34 68 55 89 20 20 88 35 88 69 0 71-49 108-140 108-46 0-79 12-101 35-18 19-27 45-35 73-12 42-46 92-99 147 51 9 87 12 114 12 53 0 81 18 81 57 0 50-33 80-89 80-40 0-91-9-151-27-26 40-54 68-83 84Z"/>
    <clipPath id="bear-clip">
      <use href="#bear-shape"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" fill="#040507"/>
  <ellipse cx="512" cy="494" rx="428" ry="370" fill="url(#glow)" filter="url(#softGlow)"/>

  <g filter="url(#edgeGlow)">
    <use href="#bear-shape" fill="#202c43" stroke="#42516a" stroke-width="5" stroke-linejoin="round"/>
    <g clip-path="url(#bear-clip)">
      <ellipse cx="500" cy="712" rx="206" ry="156" fill="#3b4962" opacity="0.18"/>
      <ellipse cx="410" cy="418" rx="242" ry="168" fill="#40506a" opacity="0.15"/>
      <ellipse cx="732" cy="286" rx="110" ry="88" fill="#4a5a74" opacity="0.12"/>
    </g>
    <circle cx="792" cy="315" r="20" fill="#31405a" stroke="#52627c" stroke-width="3"/>
    <path d="M842 328c28 6 48 22 63 44 10 15 18 23 37 28-4 29-17 49-39 59-33 15-73 14-93-3-15-13-18-45-8-72 10-27 23-45 40-56Z" fill="#313f59" stroke="#52627c" stroke-width="4" stroke-linejoin="round"/>
    <ellipse cx="517" cy="903" rx="318" ry="18" fill="#1f2a40" stroke="#435069" stroke-width="4"/>
  </g>
</svg>
